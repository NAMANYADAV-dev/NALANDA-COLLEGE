# Continuous integration for the Nalanda College site.
#
# Runs on every push and on pull requests into main. Three gates, in the order
# a developer would run them locally: types, unit tests, then a full production
# build. Any red gate blocks the merge.
#
# No secrets are injected: `next build` degrades to the static seed data when
# NEXT_PUBLIC_SUPABASE_URL is absent (see next.config.mjs and the query layer's
# isSupabaseConfigured guards), so the build exercises the real render path
# without touching a live database.

name: CI

on:
  push:
  pull_request:
    branches: [main]

# One in-flight run per branch; a newer push cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Type-check, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` installs exactly what package-lock.json pins — reproducible and
      # faster than `npm install`, and it fails if the lockfile is out of sync.
      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only Chromium, with its OS libraries — matches playwright.config.ts.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts builds and starts the app itself (no secrets), so
      # this one command covers build + serve + run.
      - name: Run E2E tests
        run: npm run test:e2e

      # Keep the HTML report when something fails, so a red run is debuggable.
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-auth:
    name: End-to-end — admin CRUD (test Supabase)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Credentials come from repository secrets — a dedicated *test* Supabase
      # project, NEVER production (playwright.admin.config.ts also refuses the
      # prod ref). If the secrets are unset the spec's test.skip() turns this
      # into a no-op pass instead of a failure, so forks aren't blocked.
      - name: Run authenticated admin E2E
        run: npm run test:e2e:auth
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-auth-report
          path: playwright-report/
          retention-days: 7
